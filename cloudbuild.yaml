# =============================================================================
# GestorCooperativo — Pipeline CI/CD con Cloud Build
# Repositorio: panel.backend (raíz = /services)
# Uso: gcloud builds submit --config=cloudbuild.yaml \
#        --substitutions=_SERVICE=svc-vivienda
# =============================================================================

substitutions:
  _SERVICE: "svc-vivienda"
  _REGION: "southamerica-east1"
  _PROJECT: "gestorcooperativo"
  _REGISTRY: "southamerica-east1-docker.pkg.dev"

steps:
  # ---------------------------------------------------------------------------
  # Step 1: Build de imagen Docker
  # ---------------------------------------------------------------------------
  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    args:
      - "build"
      - "--tag=${_REGISTRY}/${_PROJECT}/ministerio-docker/${_SERVICE}:${SHORT_SHA}"
      - "--tag=${_REGISTRY}/${_PROJECT}/ministerio-docker/${_SERVICE}:latest"
      - "--file=${_SERVICE}/Dockerfile"
      - "${_SERVICE}"
    waitFor: ["-"]

  # ---------------------------------------------------------------------------
  # Step 2: Push al Artifact Registry
  # ---------------------------------------------------------------------------
  - name: "gcr.io/cloud-builders/docker"
    id: "push-sha"
    args:
      - "push"
      - "${_REGISTRY}/${_PROJECT}/ministerio-docker/${_SERVICE}:${SHORT_SHA}"
    waitFor: ["build"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-latest"
    args:
      - "push"
      - "${_REGISTRY}/${_PROJECT}/ministerio-docker/${_SERVICE}:latest"
    waitFor: ["build"]

  # ---------------------------------------------------------------------------
  # Step 3: Deploy a Cloud Run
  # ---------------------------------------------------------------------------
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE}"
      - "--image=${_REGISTRY}/${_PROJECT}/ministerio-docker/${_SERVICE}:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--no-allow-unauthenticated"
      - "--service-account=${_SERVICE}@${_PROJECT}.iam.gserviceaccount.com"
      - "--set-secrets=DATABASE_URL=${_SERVICE}-db-url:latest"
      - "--set-env-vars=GCP_PROJECT_ID=${_PROJECT},SERVICE_NAME=${_SERVICE},ENVIRONMENT=production"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--concurrency=80"
      - "--add-cloudsql-instances=${_PROJECT}:${_REGION}:ministerio-postgres"
    waitFor: ["push-sha"]

images:
  - "${_REGISTRY}/${_PROJECT}/ministerio-docker/${_SERVICE}:${SHORT_SHA}"
  - "${_REGISTRY}/${_PROJECT}/ministerio-docker/${_SERVICE}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"

timeout: "900s"
